<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora</title>
    
    <link rel="apple-touch-icon" sizes="180x180" href="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cd/iOS_Calculator_Icon.svg/512px-iOS_Calculator_Icon.svg.png">
    <link rel="icon" type="image/png" sizes="192x192" href="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cd/iOS_Calculator_Icon.svg/512px-iOS_Calculator_Icon.svg.png">
    <link rel="icon" type="image/png" sizes="512x512" href="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cd/iOS_Calculator_Icon.svg/512px-iOS_Calculator_Icon.svg.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }

        body {
            background-color: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- ESTILO DA CALCULADORA (PADRÃO IPHONE) --- */
        .calc-container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            background-color: #000;
        }

        .display {
            font-size: 70px;
            font-weight: 300;
            text-align: right;
            padding: 10px;
            margin-bottom: 15px;
            overflow-x: auto;
            white-space: nowrap;
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn {
            background-color: #333333;
            color: white;
            font-size: 30px;
            border: none;
            border-radius: 50%;
            aspect-ratio: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: filter 0.1s;
        }

        .btn:active {
            filter: brightness(1.4);
        }

        .btn.op {
            background-color: #ff9f0a;
        }

        .btn.top {
            background-color: #a5a5a5;
            color: black;
            font-size: 26px;
        }

        .btn.zero {
            grid-column: span 2;
            aspect-ratio: auto;
            height: 100%;
            border-radius: 40px;
            justify-content: flex-start;
            padding-left: 30px;
        }

        /* --- ESTILO DO CHAT SECRETO --- */
        .chat-container {
            display: none;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background-color: #1c1c1e;
            flex-direction: column;
        }

        .chat-header {
            background-color: #2c2c2e;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            border-bottom: 1px solid #3a3a3c;
        }

        .messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg-box {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 16px;
            word-wrap: break-word;
            display: flex;
            flex-direction: column;
        }

        .msg-box .sender {
            font-size: 11px;
            opacity: 0.6;
            margin-bottom: 3px;
            font-weight: bold;
        }

        .msg-box.me {
            background-color: #0b84ff;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .msg-box.other {
            background-color: #3a3a3c;
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .chat-input-area {
            padding: 12px;
            background-color: #2c2c2e;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            background-color: #1c1c1e;
            border: 1px solid #3a3a3c;
            border-radius: 20px;
            padding: 10px 15px;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .send-btn {
            background-color: #0b84ff;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>

    <div id="calc" class="calc-container">
        <div id="display" class="display">0</div>
        <div class="buttons-grid">
            <button class="btn top" onclick="clearCalc()">AC</button>
            <button class="btn top" onclick="pressKey('+/-')">+/-</button>
            <button class="btn top" onclick="pressKey('%')">%</button>
            <button class="btn op" onclick="pressKey('/')">÷</button>

            <button class="btn" onclick="pressKey('7')">7</button>
            <button class="btn" onclick="pressKey('8')">8</button>
            <button class="btn" onclick="pressKey('9')">9</button>
            <button class="btn op" onclick="pressKey('*')">×</button>

            <button class="btn" onclick="pressKey('4')">4</button>
            <button class="btn" onclick="pressKey('5')">5</button>
            <button class="btn" onclick="pressKey('6')">6</button>
            <button class="btn op" onclick="pressKey('-')">-</button>

            <button class="btn" onclick="pressKey('1')">1</button>
            <button class="btn" onclick="pressKey('2')">2</button>
            <button class="btn" onclick="pressKey('3')">3</button>
            <button class="btn op" onclick="pressKey('+')">+</button>

            <button class="btn zero" onclick="pressKey('0')">0</button>
            <button class="btn" onclick="pressKey('.')">,</button>
            <button class="btn op" onclick="calculate()">=</button>
        </div>
    </div>

    <div id="chat" class="chat-container">
        <div class="chat-header">Notas de Matemática 📝</div>
        <div id="messages" class="messages"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" class="chat-input" placeholder="Digite uma nota...">
            <button class="send-btn" onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <script>
        let currentInput = "";
        let typedHistory = "";
        let codename = "";
        let database = null;

        // --- LÓGICA DA CALCULADORA ---
        function pressKey(key) {
            if (currentInput === "0" && key !== ".") currentInput = "";
            currentInput += key;
            document.getElementById("display").innerText = currentInput.replace('*', '×').replace('/', '÷');

            // Guarda o histórico real de cliques
            typedHistory += key;
            
            // 🌟 NOVO GATILHO DO CHAT SECRETO: 606+
            if (typedHistory.includes("606+")) {
                openSecretChat();
            }
        }

        function clearCalc() {
            currentInput = "0";
            typedHistory = "";
            document.getElementById("display").innerText = "0";
        }

        function calculate() {
            try {
                let result = eval(currentInput);
                document.getElementById("display").innerText = result;
                currentInput = String(result);
            } catch (e) {
                document.getElementById("display").innerText = "Erro";
                currentInput = "";
            }
        }

        // --- LÓGICA DO CHAT ---
        function openSecretChat() {
            document.getElementById("calc").style.display = "none";
            document.getElementById("chat").style.display = "flex";
            
            codename = localStorage.getItem("chat_codename");
            if (!codename) {
                codename = prompt("Escolha seu codinome para o chat:");
                if (!codename) codename = "Anônimo";
                localStorage.setItem("chat_codename", codename);
            }

            // ⚠️ COLOQUE AS SUAS CHAVES DO FIREBASE AQUI QUANDO QUISER DEIXAR ONLINE ⚠️
            const firebaseConfig = {
                apiKey: "COLE_AQUI_SUA_API_KEY",
                authDomain: "COLE_AQUI_SEU_AUTH_DOMAIN",
                databaseURL: "COLE_AQUI_SUA_DATABASE_URL",
                projectId: "COLE_AQUI_SEU_PROJECT_ID",
                storageBucket: "COLE_AQUI_SEU_STORAGE_BUCKET",
                messagingSenderId: "COLE_AQUI_MESSAGING_SENDER_ID",
                appId: "COLE_AQUI_APP_ID"
            };

            if (firebaseConfig.apiKey !== "COLE_AQUI_SUA_API_KEY") {
                firebase.initializeApp(firebaseConfig);
                database = firebase.database();

                database.ref("messages").on("child_added", (snapshot) => {
                    const data = snapshot.val();
                    renderMessage(data.sender, data.text);
                });
            } else {
                renderMessage("Sistema", "Conectado offline. Configure o Firebase para enviar mensagens de verdade!");
            }
        }

        function sendMessage() {
            const input = document.getElementById("chatInput");
            const text = input.value.trim();
            if (!text) return;

            if (database) {
                database.ref("messages").push({
                    sender: codename,
                    text: text,
                    timestamp: Date.now()
                });
            } else {
                renderMessage(codename, text);
            }
            input.value = "";
        }

        function renderMessage(sender, text) {
            const messagesDiv = document.getElementById("messages");
            const isMe = sender === codename;
            
            const msgBox = document.createElement("div");
            msgBox.classList.add("msg-box", isMe ? "me" : "other");
            
            msgBox.innerHTML = `<span class="sender">${sender}</span><span>${text}</span>`;
            messagesDiv.appendChild(msgBox);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        document.getElementById("chatInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
